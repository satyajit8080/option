server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every non-file route serves index.html so client-side
    # routing works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
